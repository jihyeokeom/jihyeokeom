<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluvo — Warygary Studio</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #111111;
      --white: #ffffff;
      --gray-light: #e8e8e8;
      --gray-mid: #999999;
      --font: 'Pretendard', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--white);
      color: var(--black);
      font-size: 14px;
      line-height: 1.6;
      letter-spacing: -0.03em;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 48px;
      background: var(--white);
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s;
    }
    nav.scrolled { border-color: var(--gray-light); }
    .nav-logo { font-size: 15px; font-weight: 600; text-decoration: none; color: var(--black); }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a { font-size: 13px; text-decoration: none; color: var(--black); transition: color 0.2s; }
    .nav-links a:hover { color: var(--gray-mid); }

    /* ── PAGE WRAPPER ── */
    .page {
      padding-top: 100px;
    }

    /* ── TOP SECTION: Main image + Info ── */
    .top-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .main-image-box {
      background: var(--gray-light);
      overflow: hidden;
      position: relative;
      aspect-ratio: 3 / 4;
    }
    .main-image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── PRODUCT INFO (right column) ── */
    .product-info {
      padding: 48px 48px 48px 56px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-left: 1px solid var(--gray-light);
    }

    .info-top { display: flex; flex-direction: column; gap: 32px; }

    .product-name-block { display: flex; flex-direction: column; gap: 6px; }
    .product-name {
      font-size: clamp(28px, 3vw, 42px);
      font-weight: 500;
    }
    .product-type {
      font-size: 14px;
      color: var(--gray-mid);
    }

    .meta-table { display: flex; flex-direction: column; gap: 10px; }
    .meta-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--gray-light);
    }
    .meta-row:last-child { border-bottom: none; }
    .meta-key { color: var(--gray-mid); }
    .meta-val { color: var(--black); }

    .price-block { display: flex; flex-direction: column; gap: 4px; }
    .price-label { font-size: 10px; color: var(--gray-mid); text-transform: uppercase; letter-spacing: 0.06em; }
    .price-krw { font-size: clamp(22px, 2.5vw, 34px); font-weight: 400; }
    .price-usd { font-size: 13px; color: var(--gray-mid); }

    /* ── DESC IN INFO ── */
    .info-desc-block {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .lang-toggle {
      display: flex;
      gap: 0;
      border: 1px solid var(--gray-light);
      width: fit-content;
    }

    .lang-btn {
      padding: 5px 14px;
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: -0.03em;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--gray-mid);
      transition: background 0.2s, color 0.2s;
    }

    .lang-btn.active {
      background: var(--black);
      color: var(--white);
    }

    .info-desc-text {
      font-size: 12px;
      line-height: 1.9;
      color: #555;
      word-break: keep-all;
      display: none;
    }

    .info-desc-text.visible { display: block; }

    .btn-group { display: flex; flex-direction: column; gap: 8px; }
    .btn-purchase {
      display: block;
      width: 100%;
      padding: 17px 24px;
      background: var(--black);
      color: var(--white);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.03em;
      text-align: center;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.25s;
    }
    .btn-purchase:hover { background: #333; }
    .btn-inquiry {
      display: block;
      width: 100%;
      padding: 15px 24px;
      background: transparent;
      color: var(--black);
      font-family: var(--font);
      font-size: 12px;
      letter-spacing: -0.03em;
      text-align: center;
      border: 1px solid var(--gray-light);
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.25s;
    }
    .btn-inquiry:hover { border-color: var(--black); }

    /* ── CAROUSEL SECTION ── */
    .carousel-section {
      position: relative;
      background: var(--gray-light);
      overflow: hidden;
      margin-top: 48px;
    }

    .carousel-track-wrap {
      overflow: hidden;
    }

    .carousel-track {
      display: flex;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .carousel-slide {
      min-width: 100%;
      aspect-ratio: 3 / 4;
      background: var(--gray-light);
      flex-shrink: 0;
    }
    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Arrows */
    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 16px;
      color: var(--black);
      font-size: 22px;
      line-height: 1;
      z-index: 10;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .carousel-btn:hover { opacity: 1; }
    .carousel-btn.prev { left: 12px; }
    .carousel-btn.next { right: 12px; }

    /* Dots */
    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 20px 0;
      background: var(--white);
      border-top: 1px solid var(--gray-light);
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gray-light);
      border: none;
      cursor: pointer;
      padding: 0;
      transition: background 0.2s;
    }
    .dot.active { background: var(--black); }

    /* ── DESCRIPTION SECTION ── */
    .desc-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 64px;
      padding: 72px 48px 80px;
      border-top: 1px solid var(--black);
    }

    .desc-block { display: flex; flex-direction: column; gap: 14px; }
    .desc-lang {
      font-size: 10px;
      color: var(--gray-mid);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .desc-text {
      font-size: 13px;
      line-height: 1.95;
      color: #333;
      word-break: keep-all;
    }

    /* ── BACK NAV ── */
    .back-bar {
      padding: 24px 48px;
      border-top: 1px solid var(--gray-light);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .back-link {
      font-size: 12px;
      color: var(--gray-mid);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--black); }
    .copy { font-size: 11px; color: var(--gray-mid); }

    /* ── LIGHTBOX ── */
    .lb-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.92);
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .lb-overlay.open { display: flex; }

    .lb-img-wrap {
      position: relative;
      max-width: 90vw;
      max-height: 82vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lb-img-wrap img {
      max-width: 90vw;
      max-height: 82vh;
      object-fit: contain;
      display: block;
      user-select: none;
    }

    .lb-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #fff;
      font-size: 36px;
      line-height: 1;
      cursor: pointer;
      padding: 20px;
      opacity: 0.5;
      transition: opacity 0.2s;
      z-index: 1001;
    }
    .lb-btn:hover { opacity: 1; }
    .lb-btn.prev { left: 16px; }
    .lb-btn.next { right: 16px; }

    .lb-close {
      position: fixed;
      top: 20px;
      right: 24px;
      background: none;
      border: none;
      color: #fff;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s;
      z-index: 1001;
    }
    .lb-close:hover { opacity: 1; }

    .lb-dots {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }
    .lb-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      border: none;
      cursor: pointer;
      padding: 0;
      transition: background 0.2s;
    }
    .lb-dot.active { background: #fff; }

    .lb-counter {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      letter-spacing: 0.06em;
      z-index: 1001;
    }

    /* Clickable images */
    .main-image-box img,
    .carousel-slide img {
      cursor: zoom-in;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      nav { padding: 22px 24px; }
      .top-section { grid-template-columns: 1fr; }
      .main-image-box { aspect-ratio: 4 / 3; }
      .product-info { padding: 40px 24px; border-left: none; border-top: 1px solid var(--gray-light); }
      .desc-section { grid-template-columns: 1fr; gap: 40px; padding: 56px 24px 64px; }
      .back-bar { padding: 24px; }
    }

    @media (max-width: 600px) {
      nav { padding: 18px 20px; }
      .nav-links { gap: 20px; }
      .product-info { padding: 32px 20px; }
      .desc-section { padding: 48px 20px 56px; }
      .back-bar { padding: 20px; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav id="navbar">
    <a href="index.html" class="nav-logo">Warygary Studio</a>
    <ul class="nav-links">
      <li><a href="index.html#works">Works</a></li>
      <li><a href="index.html#designer">Designer</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
  </nav>

  <div class="page">

    <!-- TOP: Main image + Product info -->
    <div class="top-section">
      <div class="main-image-box">
        <img src="images/works/02/main.jpg" alt="Fluvo — Main" />
      </div>

      <div class="product-info">
        <div class="info-top">
          <div class="product-name-block">
            <h1 class="product-name">Fluvo</h1>
            <p class="product-type">Interactive Learning Robot</p>
          </div>

          <div class="meta-table">
            <div class="meta-row">
              <span class="meta-key">Product</span>
              <span class="meta-val">Fluvo — Interactive Learning Robot</span>
            </div>
            <div class="meta-row">
              <span class="meta-key">Designer</span>
              <span class="meta-val">none</span>
            </div>
            <div class="meta-row">
              <span class="meta-key">Material</span>
              <span class="meta-val">none</span>
            </div>
            <div class="meta-row">
              <span class="meta-key">Year</span>
              <span class="meta-val">none</span>
            </div>
          </div>

          <div class="price-block">
            <span class="price-label">Price</span>
            <span class="price-krw">₩1,200,000</span>
            <span class="price-usd">$900 USD</span>
          </div>
        </div>

        <div class="info-desc-block">
          <div class="lang-toggle">
            <button class="lang-btn active" data-lang="ko">KO</button>
            <button class="lang-btn" data-lang="en">EN</button>
          </div>
          <p class="info-desc-text visible" id="desc-ko">none</p>
          <p class="info-desc-text" id="desc-en">none</p>
        </div>

        <div class="btn-group">
          <a href="index.html#contact" class="btn-purchase">구매하기 — Purchase</a>
          <a href="index.html#contact" class="btn-inquiry">문의하기 — Inquiry</a>
        </div>
      </div>
    </div>

    <!-- CAROUSEL: images 02 ~ 05 -->
    <div class="carousel-section">
      <button class="carousel-btn prev" aria-label="이전">&#8249;</button>
      <div class="carousel-track-wrap">
        <div class="carousel-track" id="track">
          <div class="carousel-slide">
            <img src="images/works/02/02.jpg" alt="Fluvo — 02" />
          </div>
          <div class="carousel-slide">
            <img src="images/works/02/03.jpg" alt="Fluvo — 03" />
          </div>
          <div class="carousel-slide">
            <img src="images/works/02/04.jpg" alt="Fluvo — 04" />
          </div>
          <div class="carousel-slide">
            <img src="images/works/02/05.jpg" alt="Fluvo — 05" />
          </div>
        </div>
      </div>
      <button class="carousel-btn next" aria-label="다음">&#8250;</button>
    </div>
    <div class="carousel-dots" id="dots"></div>

    <!-- DESCRIPTION -->
    <div class="desc-section">
      <div class="desc-block">
        <span class="desc-lang">한국어</span>
        <p class="desc-text">none</p>
      </div>
      <div class="desc-block">
        <span class="desc-lang">English</span>
        <p class="desc-text">none</p>
      </div>
    </div>

    <!-- BACK -->
    <div class="back-bar">
      <a href="index.html#works" class="back-link">← All Works</a>
      <span class="copy">© 2024 Warygary Studio</span>
    </div>

  </div>

  <!-- LIGHTBOX -->
  <div class="lb-overlay" id="lb">
    <button class="lb-close" id="lb-close">&#215;</button>
    <span class="lb-counter" id="lb-counter"></span>
    <button class="lb-btn prev" id="lb-prev">&#8249;</button>
    <div class="lb-img-wrap">
      <img id="lb-img" src="" alt="" />
    </div>
    <button class="lb-btn next" id="lb-next">&#8250;</button>
    <div class="lb-dots" id="lb-dots"></div>
  </div>

  <script>
    // ── Language toggle ──
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const lang = btn.dataset.lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b === btn));
        document.getElementById('desc-ko').classList.toggle('visible', lang === 'ko');
        document.getElementById('desc-en').classList.toggle('visible', lang === 'en');
      });
    });

    // ── Nav scroll ──
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
      navbar.classList.toggle('scrolled', window.scrollY > 20);
    });

    // ── All images (main + carousel 02~05) ──
    const allSrcs = [
      'images/works/02/main.jpg',
      'images/works/02/02.jpg',
      'images/works/02/03.jpg',
      'images/works/02/04.jpg',
      'images/works/02/05.jpg'
    ];
    const total = allSrcs.length;

    // ── Carousel ──
    const track   = document.getElementById('track');
    const slides  = track.querySelectorAll('.carousel-slide');
    const dotsWrap = document.getElementById('dots');
    let carCurrent = 0;

    slides.forEach((_, i) => {
      const dot = document.createElement('button');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => carGoTo(i));
      dotsWrap.appendChild(dot);
    });

    function carGoTo(index) {
      carCurrent = (index + slides.length) % slides.length;
      track.style.transform = `translateX(-${carCurrent * 100}%)`;
      dotsWrap.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i === carCurrent);
      });
    }

    document.querySelector('.carousel-btn.prev').addEventListener('click', () => carGoTo(carCurrent - 1));
    document.querySelector('.carousel-btn.next').addEventListener('click', () => carGoTo(carCurrent + 1));

    let carStartX = 0;
    track.addEventListener('touchstart', e => { carStartX = e.touches[0].clientX; });
    track.addEventListener('touchend', e => {
      const diff = carStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) carGoTo(carCurrent + (diff > 0 ? 1 : -1));
    });

    // ── Lightbox ──
    const lb       = document.getElementById('lb');
    const lbImg    = document.getElementById('lb-img');
    const lbDots   = document.getElementById('lb-dots');
    const lbCounter = document.getElementById('lb-counter');
    let lbCurrent  = 0;

    // Build lightbox dots
    allSrcs.forEach((_, i) => {
      const dot = document.createElement('button');
      dot.className = 'lb-dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => lbGoTo(i));
      lbDots.appendChild(dot);
    });

    function lbGoTo(index) {
      lbCurrent = (index + total) % total;
      lbImg.src = allSrcs[lbCurrent];
      lbCounter.textContent = `${lbCurrent + 1} / ${total}`;
      lbDots.querySelectorAll('.lb-dot').forEach((d, i) => {
        d.classList.toggle('active', i === lbCurrent);
      });
    }

    function lbOpen(index) {
      lbGoTo(index);
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function lbClose() {
      lb.classList.remove('open');
      document.body.style.overflow = '';
    }

    // Main image click → index 0
    document.querySelector('.main-image-box img')
      .addEventListener('click', () => lbOpen(0));

    // Carousel slide clicks → index 1~4
    slides.forEach((slide, i) => {
      slide.querySelector('img').addEventListener('click', () => lbOpen(i + 1));
    });

    document.getElementById('lb-prev').addEventListener('click', e => { e.stopPropagation(); lbGoTo(lbCurrent - 1); });
    document.getElementById('lb-next').addEventListener('click', e => { e.stopPropagation(); lbGoTo(lbCurrent + 1); });
    document.getElementById('lb-close').addEventListener('click', lbClose);

    // Click outside image to close
    lb.addEventListener('click', e => { if (e.target === lb) lbClose(); });

    // Keyboard
    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'ArrowLeft')  lbGoTo(lbCurrent - 1);
      if (e.key === 'ArrowRight') lbGoTo(lbCurrent + 1);
      if (e.key === 'Escape')     lbClose();
    });

    // Touch swipe in lightbox
    let lbStartX = 0;
    lb.addEventListener('touchstart', e => { lbStartX = e.touches[0].clientX; });
    lb.addEventListener('touchend', e => {
      const diff = lbStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) lbGoTo(lbCurrent + (diff > 0 ? 1 : -1));
    });
  </script>

</body>
</html>
